<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #0f0f12; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }
  svg { animation: spin 3s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .name { color: rgba(255,255,255,0.85); font-size: 18px; font-weight: 600; letter-spacing: 0.04em; }
  .by   { color: rgba(255,255,255,0.3);  font-size: 12px; letter-spacing: 0.08em; }
</style>
</head>
<body>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none" width="64" height="64">
    <circle cx="20" cy="20" r="20" fill="#0f0f12"/>
    <circle cx="20" cy="20" r="17" stroke="#6366f1" stroke-width="1" opacity="0.35"/>
    <circle cx="20" cy="20" r="11" stroke="#6366f1" stroke-width="1" opacity="0.55"/>
    <circle cx="20" cy="20" r="5"  stroke="#6366f1" stroke-width="1" opacity="0.75"/>
    <circle cx="20" cy="20" r="3.2" fill="#818cf8"/>
    <circle cx="10" cy="13" r="2.5" fill="#f59e0b"/>
    <circle cx="34" cy="15" r="2"   fill="#4ade80"/>
  </svg>
  <div class="name">Continuous.Testing</div>
  <div class="by">continuous.engineering</div>
</body>
</html>
